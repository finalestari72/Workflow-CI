name: "🤖 CI — Water Potability MLflow Training"

on:
  push:
    branches: [main, master]
    paths:
      - "MLProject/**"
  pull_request:
    paths:
      - "MLProject/**"
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Jumlah estimator (pohon)"
        default: "200"
        required: false
      max_depth:
        description: "Max depth (0 = None)"
        default: "10"
        required: false
      min_samples_split:
        description: "Min samples split"
        default: "2"
        required: false
      min_samples_leaf:
        description: "Min samples leaf"
        default: "1"
        required: false
      max_features:
        description: "Max features (sqrt / log2)"
        default: "sqrt"
        required: false

jobs:
  train:
    name: "Train & Log Model"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow matplotlib

      - name: "🚀 Run MLflow Project"
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          # Ketiga env ini harus ada di sini agar mlflow run (CLI)
          # sudah tahu tracking server SEBELUM membuat Run ID
          MLFLOW_TRACKING_URI:      "https://dagshub.com/finalestari2712/Membangun_model.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          N_EST="${{ github.event.inputs.n_estimators }}"
          DEPTH="${{ github.event.inputs.max_depth }}"
          MSS="${{ github.event.inputs.min_samples_split }}"
          MSL="${{ github.event.inputs.min_samples_leaf }}"
          MF="${{ github.event.inputs.max_features }}"

          [ -z "$N_EST" ] && N_EST="200"
          [ -z "$DEPTH" ] && DEPTH="10"
          [ -z "$MSS" ]   && MSS="2"
          [ -z "$MSL" ]   && MSL="1"
          [ -z "$MF" ]    && MF="sqrt"

          mlflow run MLProject \
            -P n_estimators=$N_EST \
            -P max_depth=$DEPTH \
            -P min_samples_split=$MSS \
            -P min_samples_leaf=$MSL \
            -P max_features=$MF \
            --env-manager=local

      - name: "📦 Upload artefak ke GitHub Actions"
        uses: actions/upload-artifact@v4
        with:
          name: "mlflow-artifacts-${{ github.run_number }}"
          path: mlruns/
          retention-days: 30

      - name: "📤 Commit artefak ke repository"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 CI run #${{ github.run_number }} — mlflow artifacts"
          file_pattern: "mlruns/**"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  docker:
    name: "🐳 Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: train
    timeout-minutes: 30
    if: github.event_name != 'pull_request'

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "📦 Install MLflow"
        run: pip install mlflow

      - name: "🔑 Login ke Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "🐳 Build Docker image dari MLflow model"
        env:
          MLFLOW_TRACKING_URI:      "https://dagshub.com/finalestari2712/Membangun_model.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/water-potability-model"

          mlflow models build-docker \
            -m "models:/WaterPotability_CI/latest" \
            -n "$IMAGE_NAME" \
            --enable-mlserver

          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:${{ github.run_number }}"

      - name: "🚀 Push image ke Docker Hub"
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/water-potability-model"
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${{ github.run_number }}"
          echo "✅ Image pushed: $IMAGE_NAME:latest"
          echo "✅ Image pushed: $IMAGE_NAME:${{ github.run_number }}"