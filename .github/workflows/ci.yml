name: "CI — Water Potability MLflow Training"

on:
  push:
    branches: [main, master]
    paths:
      - "MLProject/**"
  pull_request:
    paths:
      - "MLProject/**"
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Jumlah estimator (pohon Random Forest)"
        default: "200"
        required: false
      max_depth:
        description: "Max depth pohon (0 = None / unlimited)"
        default: "10"
        required: false
      min_samples_split:
        description: "Min samples untuk split node"
        default: "2"
        required: false
      min_samples_leaf:
        description: "Min samples di leaf node"
        default: "1"
        required: false
      max_features:
        description: "Jumlah fitur per split (sqrt / log2)"
        default: "sqrt"
        required: false

jobs:
  train-and-deploy:
    name: "Train, Upload Artifact & Push Docker"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ──────────────────────────────────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Run actions/checkout@v3"
        uses: actions/checkout@v3

      # ──────────────────────────────────────────────────────────────────────────
      # 2. Setup Python
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Set up Python 3.12.7"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # ──────────────────────────────────────────────────────────────────────────
      # 3. Check Env
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Check Env"
        run: |
          echo "=== Python Version ==="
          python --version
          echo "=== Pip Version ==="
          pip --version
          echo "=== Working Directory ==="
          pwd
          echo "=== Repository Structure ==="
          find . -type f | head -30

      # ──────────────────────────────────────────────────────────────────────────
      # 4. Install dependencies (untuk mlflow run)
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas>=2.0.0 \
            numpy>=1.24.0 \
            "scikit-learn==1.5.2" \
            "mlflow==2.19.0" \
            matplotlib>=3.7.0 \
            seaborn>=0.12.0

      # ──────────────────────────────────────────────────────────────────────────
      # 5. Run MLflow Project
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Run mlflow project"
        env:
          DAGSHUB_TOKEN:            ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI:      "https://dagshub.com/finalestari2712/Membangun_model.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          N_EST="${{ github.event.inputs.n_estimators }}"
          DEPTH="${{ github.event.inputs.max_depth }}"
          MSS="${{ github.event.inputs.min_samples_split }}"
          MSL="${{ github.event.inputs.min_samples_leaf }}"
          MF="${{ github.event.inputs.max_features }}"

          [ -z "$N_EST" ] && N_EST="200"
          [ -z "$DEPTH" ] && DEPTH="10"
          [ -z "$MSS" ]   && MSS="2"
          [ -z "$MSL" ]   && MSL="1"
          [ -z "$MF" ]    && MF="sqrt"

          echo "=== Parameter MLflow Run ==="
          echo "n_estimators      : $N_EST"
          echo "max_depth         : $DEPTH"
          echo "min_samples_split : $MSS"
          echo "min_samples_leaf  : $MSL"
          echo "max_features      : $MF"

          mlflow run MLProject \
            --experiment-name "Water-Potability-CI" \
            -P n_estimators=$N_EST \
            -P max_depth=$DEPTH \
            -P min_samples_split=$MSS \
            -P min_samples_leaf=$MSL \
            -P max_features=$MF \
            --env-manager=local

      # ──────────────────────────────────────────────────────────────────────────
      # 6. Get latest MLflow run_id
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Get latest MLflow run_id"
        env:
          MLFLOW_TRACKING_URI:      "https://dagshub.com/finalestari2712/Membangun_model.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import mlflow, os

          client = mlflow.tracking.MlflowClient()
          experiment = client.get_experiment_by_name("Water-Potability-CI")
          if experiment is None:
              raise ValueError("Experiment 'Water-Potability-CI' tidak ditemukan!")

          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["start_time DESC"],
              max_results=1
          )
          if not runs:
              raise ValueError("Tidak ada run yang ditemukan!")

          run_id = runs[0].info.run_id
          print(f"Latest Run ID: {run_id}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"MLFLOW_RUN_ID={run_id}\n")
          EOF

      # ──────────────────────────────────────────────────────────────────────────
      # 7. Install Python dependencies (untuk download/upload script)
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Install Python dependencies"
        run: |
          pip install requests

      # ──────────────────────────────────────────────────────────────────────────
      # 7b. Download MLflow artifacts dari DagsHub ke lokal
      # (tracking remote → mlruns/ tidak dibuat lokal, harus download dulu)
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Download MLflow artifacts from DagsHub"
        env:
          MLFLOW_TRACKING_URI:      "https://dagshub.com/finalestari2712/Membangun_model.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mkdir -p mlflow_artifacts
          python - <<'EOF'
          import mlflow, os

          run_id = os.environ["MLFLOW_RUN_ID"]
          print(f"Downloading artifacts for run: {run_id}")

          client = mlflow.tracking.MlflowClient()
          client.download_artifacts(
              run_id=run_id,
              path="",
              dst_path="mlflow_artifacts"
          )
          print("Artifacts downloaded to mlflow_artifacts/")
          EOF

      # ──────────────────────────────────────────────────────────────────────────
      # 8. Upload to GitHub (artifact)
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Upload to GitHub"
        uses: actions/upload-artifact@v4
        with:
          name: "mlflow-artifacts-run-${{ github.run_number }}"
          path: mlflow_artifacts/
          retention-days: 30

      # ──────────────────────────────────────────────────────────────────────────
      # 9. Commit mlruns ke repository (Skilled — artefak tersimpan di repo)
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Commit mlruns artifacts to repository"
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mlflow_artifacts/ || true
          git diff --cached --quiet || git commit \
            -m "ci: run #${{ github.run_number }} — mlflow artifacts [skip ci]"
          git push || true

      # ──────────────────────────────────────────────────────────────────────────
      # 10. Build Docker Model (Advanced — mlflow models build-docker)
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Build Docker Model"
        if: github.event_name != 'pull_request'
        env:
          MLFLOW_TRACKING_URI:      "https://dagshub.com/finalestari2712/Membangun_model.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/water-potability-model"
          echo "Building Docker image: $IMAGE_NAME"
          echo "Using run_id: $MLFLOW_RUN_ID"

          # Gunakan run_id langsung (bukan registry) agar env conda sinkron
          # --env-manager=local: install pip langsung, hindari error Python 3.9 apt
          mlflow models build-docker \
            -m "runs:/$MLFLOW_RUN_ID/model" \
            -n "$IMAGE_NAME" \
            --env-manager=local

      # ──────────────────────────────────────────────────────────────────────────
      # 11. Log in to Docker Hub
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Log in to Docker Hub"
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ──────────────────────────────────────────────────────────────────────────
      # 12. Tag Docker Image
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Tag Docker Image"
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/water-potability-model"
          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:run-${{ github.run_number }}"
          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:${{ github.sha }}"
          echo "Tags created:"
          echo "  - $IMAGE_NAME:latest"
          echo "  - $IMAGE_NAME:run-${{ github.run_number }}"
          echo "  - $IMAGE_NAME:${{ github.sha }}"

      # ──────────────────────────────────────────────────────────────────────────
      # 13. Push Docker Image
      # ──────────────────────────────────────────────────────────────────────────
      - name: "Push Docker Image"
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/water-potability-model"
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:run-${{ github.run_number }}"
          docker push "$IMAGE_NAME:${{ github.sha }}"
          echo "✅ Docker image berhasil di-push ke Docker Hub!"
          echo "   Pull command: docker pull $IMAGE_NAME:latest"